# Headless — no web UI in CI
headless = false

# Docker-safe user count
users = 20
spawn-rate = 5

# Short enough for nightly, long enough for steady state
run-time = 2m

# CSV report output
csv = reports/performance/results
csv-full-history = true

# Exit non-zero if any requests fail — lets the pipeline stage detect errors
exit-code-on-error = 1
