[pytest]
# plugin configuration for pytest
# Pytest-xdist for parallel test execution
# `-n auto` option allows pytest to automatically 
# --dist loadscope to distribute tests by scope (e.g., by class or module)
# determine the number of CPUs available for parallel execution
# -rfEsxXp to report full tests at the end of execution
# -s (no capture) to print all the logs to screen
addopts = 
    -n auto
    --dist=loadgroup
    -s
    --junitxml=reports/junit.xml
    -rfEsxXp
    -vvv
# specify the directory where tests are located
testpaths = tests/e2e tests/api
# specify the patterns for test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Define custom markers to categorize tests
#   smoke: marks basic functionality tests that act as quick checks for core features
# - regression: marks tests designed to catch reintroduced bugs (i.e., verify past issues stay fixed).
markers =
    smoke: marks basic functionality test
    api: marks tests related to API functionality
    performance: marks tests that evaluate performance metrics
    security: marks tests that check for security vulnerabilities
    regression: marks tests for verifying bug fixes
    e2e: marks end-to-end tests that cover complete user flows
# Only measure call time of test (don't include setup/teardown)
junit_duration_report = call